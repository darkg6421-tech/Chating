<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>💬 WeChat · 2‑Person Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 8px;
    }
    .phone {
      width: 100%;
      max-width: 420px;
      height: 700px;
      background: #fff;
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      padding: 16px 20px;
      border-bottom: 1px solid #e9edef;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
    }
    .header h2 { font-weight: 600; font-size: 1.2rem; color: #111; }
    .status {
      font-size: 0.75rem;
      background: #f1f3f4;
      padding: 4px 10px;
      border-radius: 20px;
      color: #5f6368;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
      background: #e5ddd5;
      display: flex;
      flex-direction: column;
    }
    .msg-row {
      display: flex;
      margin-bottom: 8px;
    }
    .msg-row.self { justify-content: flex-end; }
    .bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.4;
      word-wrap: break-word;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      background: #ffffff;
    }
    .self .bubble {
      background: #d9fdd3;
      border-top-right-radius: 4px;
    }
    .other .bubble {
      border-top-left-radius: 4px;
    }
    .input-area {
      padding: 12px 16px;
      background: #fff;
      border-top: 1px solid #e9edef;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .input-area input {
      flex: 1;
      padding: 12px 16px;
      border: none;
      background: #f0f2f5;
      border-radius: 24px;
      font-size: 0.95rem;
      outline: none;
    }
    .input-area button {
      background: none;
      border: none;
      color: #54656f;
      font-size: 1.5rem;
      cursor: pointer;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }
    .input-area button:active { background: #e9edef; }
    .setup-panel {
      padding: 30px 24px;
      text-align: center;
      background: #fff;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .setup-panel input {
      width: 100%;
      padding: 16px;
      border: 1px solid #ddd;
      border-radius: 16px;
      font-size: 1rem;
      margin: 16px 0;
      text-align: center;
    }
    .setup-panel button {
      background: #0084ff;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 30px;
      font-weight: 500;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 8px;
    }
    .setup-panel .note {
      margin-top: 20px;
      color: #8696a0;
      font-size: 0.8rem;
    }
  </style>
  <!-- PeerJS library (free public cloud) -->
  <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
<div class="phone">
  <div class="header">
    <h2>💬 Secret Chat</h2>
    <span class="status" id="connStatus">⚪ Waiting</span>
  </div>

  <!-- Chat Screen -->
  <div id="chatPanel" style="display: none; flex:1; flex-direction:column;">
    <div class="messages" id="messageContainer"></div>
    <div class="input-area">
      <input type="text" id="msgInput" placeholder="Message" autocomplete="off" disabled>
      <button id="sendBtn" disabled>➤</button>
    </div>
  </div>

  <!-- Setup Screen -->
  <div id="setupPanel" class="setup-panel">
    <h3 style="margin-bottom:8px;">👥 Join a Room</h3>
    <p style="color:#54656f;">Enter the same room name to connect</p>
    <input type="text" id="roomInput" placeholder="e.g. coffeetalk" value="merichat123">
    <button id="joinBtn">✨ Join Room</button>
    <p class="note">🔒 Peer‑to‑peer encrypted · No server</p>
  </div>
</div>

<script>
  (function(){
    // ---------- CONFIG ----------
    const PEERJS_KEY = 'peerjs';  // free public server
    let peer;
    let conn;
    let connected = false;
    
    const statusEl = document.getElementById('connStatus');
    const setupPanel = document.getElementById('setupPanel');
    const chatPanel = document.getElementById('chatPanel');
    const msgContainer = document.getElementById('messageContainer');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const roomInput = document.getElementById('roomInput');
    const joinBtn = document.getElementById('joinBtn');

    // ---------- UI Helpers ----------
    function addMessage(text, isSelf) {
      const row = document.createElement('div');
      row.className = `msg-row ${isSelf ? 'self' : 'other'}`;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      row.appendChild(bubble);
      msgContainer.appendChild(row);
      msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    function setStatus(text, bgColor = '#f1f3f4') {
      statusEl.textContent = text;
      statusEl.style.background = bgColor;
    }

    function showChatUI() {
      setupPanel.style.display = 'none';
      chatPanel.style.display = 'flex';
      msgInput.disabled = false;
      sendBtn.disabled = false;
    }

    // ---------- Send Message ----------
    function sendMessage() {
      const msg = msgInput.value.trim();
      if (!msg || !conn || !connected) return;
      conn.send(msg);
      addMessage(msg, true);
      msgInput.value = '';
    }

    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // ---------- Connection Handling ----------
    function setupConnection(connection) {
      conn = connection;
      
      conn.on('open', () => {
        connected = true;
        setStatus('🟢 Connected', '#d9fdd3');
        showChatUI();
        addMessage('✨ Connected securely', false);
      });

      conn.on('data', (data) => {
        addMessage(data, false);
      });

      conn.on('close', () => {
        connected = false;
        setStatus('🔴 Disconnected', '#fee');
        msgInput.disabled = true;
        sendBtn.disabled = true;
        addMessage('❌ Connection closed', false);
      });

      conn.on('error', (err) => {
        console.warn(err);
        setStatus('⚠️ Error', '#fee');
      });
    }

    // ---------- Initialize Peer ----------
    function initPeer() {
      // Generate a random ID to avoid conflicts (optional)
      const peerId = 'user-' + Math.random().toString(36).substr(2, 8);
      peer = new Peer(peerId, {
        host: '0.peerjs.com',
        port: 443,
        secure: true,
        debug: 0
      });

      peer.on('open', (id) => {
        console.log('Peer ID:', id);
        setStatus('🟡 Ready', '#fff3cd');
      });

      // When someone connects to us (as the "host")
      peer.on('connection', (incomingConn) => {
        if (connected) {
          incomingConn.close();
          return;
        }
        setupConnection(incomingConn);
      });

      peer.on('error', (err) => {
        console.error(err);
        setStatus('❌ Error', '#fee');
        alert('Connection error. Please refresh.');
      });

      peer.on('disconnected', () => {
        setStatus('⚪ Reconnecting...');
        peer.reconnect();
      });
    }

    // ---------- Join Room ----------
    function joinRoom() {
      const roomName = roomInput.value.trim();
      if (!roomName) {
        alert('Please enter a room name');
        return;
      }

      setStatus('🟡 Connecting...', '#fff3cd');
      
      // We'll use the room name as the peer ID of the "host"
      // Strategy: Try to connect to that ID. If it fails, we become the host.
      
      const targetPeerId = roomName;
      
      // Attempt to connect to existing peer
      const testConn = peer.connect(targetPeerId, { reliable: true });
      
      testConn.on('open', () => {
        // Success! We connected to an existing host.
        setupConnection(testConn);
      });
      
      testConn.on('error', (err) => {
        // Connection failed, probably no one with that ID.
        // So we become the host: set our own ID to the room name.
        console.log('Becoming host...');
        
        // Disconnect current peer and recreate with the room name as ID
        peer.destroy();
        peer = new Peer(targetPeerId, {
          host: '0.peerjs.com',
          port: 443,
          secure: true,
          debug: 0
        });
        
        peer.on('open', () => {
          setStatus('🟡 Waiting for partner...', '#fff3cd');
          // We are now the host. Wait for incoming connection.
        });
        
        peer.on('connection', (incomingConn) => {
          if (connected) return;
          setupConnection(incomingConn);
        });
        
        peer.on('error', (e) => {
          if (e.type === 'unavailable-id') {
            // ID already taken (shouldn't happen but just in case)
            alert('Room name already in use. Try another.');
            location.reload();
          }
        });
      });
    }

    // ---------- Start ----------
    initPeer();
    joinBtn.addEventListener('click', joinRoom);
    
    // Allow pressing Enter in room input
    roomInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') joinRoom();
    });

    // Pre-fill a default room for testing
    roomInput.value = 'merichat' + Math.floor(Math.random()*1000);
  })();
</script>
</body>
</html>
