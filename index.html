<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>💬 WeChat P2P · Link Share</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 8px;
    }
    .phone {
      width: 100%;
      max-width: 420px;
      height: 700px;
      background: #fff;
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      padding: 16px 20px;
      border-bottom: 1px solid #e9edef;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
    }
    .header h2 { font-weight: 600; font-size: 1.2rem; color: #111; }
    .status {
      font-size: 0.75rem;
      background: #f1f3f4;
      padding: 4px 10px;
      border-radius: 20px;
      color: #5f6368;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
      background: #e5ddd5;
      display: flex;
      flex-direction: column;
    }
    .msg-row { display: flex; margin-bottom: 8px; }
    .msg-row.self { justify-content: flex-end; }
    .bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.4;
      word-wrap: break-word;
      background: #ffffff;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .self .bubble { background: #d9fdd3; border-top-right-radius: 4px; }
    .other .bubble { border-top-left-radius: 4px; }
    .input-area {
      padding: 12px 16px;
      background: #fff;
      border-top: 1px solid #e9edef;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .input-area input {
      flex: 1;
      padding: 12px 16px;
      border: none;
      background: #f0f2f5;
      border-radius: 24px;
      font-size: 0.95rem;
      outline: none;
    }
    .input-area button {
      background: none;
      border: none;
      color: #54656f;
      font-size: 1.5rem;
      cursor: pointer;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }
    .input-area button:active { background: #e9edef; }
    .setup-panel {
      padding: 30px 24px;
      text-align: center;
      background: #fff;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .setup-panel button {
      background: #0084ff;
      color: white;
      border: none;
      padding: 16px;
      border-radius: 30px;
      font-weight: 500;
      font-size: 1.1rem;
      cursor: pointer;
      margin: 12px 0;
    }
    .link-box {
      background: #f0f2f5;
      padding: 14px;
      border-radius: 16px;
      word-break: break-all;
      font-size: 0.85rem;
      margin: 16px 0;
      display: none;
    }
    .copy-btn {
      background: #e4e6eb;
      color: #050505;
      border: none;
      padding: 10px;
      border-radius: 20px;
      font-size: 0.9rem;
      cursor: pointer;
      margin-top: 8px;
      display: none;
    }
    .note { margin-top: 20px; color: #8696a0; font-size: 0.8rem; }
  </style>
</head>
<body>
<div class="phone">
  <div class="header">
    <h2>💬 Secret Chat</h2>
    <span class="status" id="connStatus">⚪ Setup</span>
  </div>

  <!-- Chat UI (hidden initially) -->
  <div id="chatPanel" style="display: none; flex:1; flex-direction:column;">
    <div class="messages" id="messageContainer"></div>
    <div class="input-area">
      <input type="text" id="msgInput" placeholder="Message" autocomplete="off" disabled>
      <button id="sendBtn" disabled>➤</button>
    </div>
  </div>

  <!-- Setup Panel -->
  <div id="setupPanel" class="setup-panel">
    <h3>🔐 Start a Chat</h3>
    <p style="color:#54656f; margin-bottom:20px;">Create a link and share with one person</p>
    <button id="createRoomBtn">✨ Create New Room</button>
    <div id="linkDisplay" class="link-box"></div>
    <button id="copyLinkBtn" class="copy-btn">📋 Copy Link</button>
    <p style="margin:20px 0;">— or —</p>
    <p style="font-size:0.9rem;">If someone sent you a link, just open it.</p>
    <p class="note">🔒 Peer‑to‑peer · No server · Auto‑connect</p>
  </div>
</div>

<script>
  (function(){
    // WebRTC config
    const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
    let pc, dataChannel;
    let isInitiator = false;
    let connected = false;

    const statusEl = document.getElementById('connStatus');
    const setupPanel = document.getElementById('setupPanel');
    const chatPanel = document.getElementById('chatPanel');
    const msgContainer = document.getElementById('messageContainer');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const createBtn = document.getElementById('createRoomBtn');
    const linkDisplay = document.getElementById('linkDisplay');
    const copyBtn = document.getElementById('copyLinkBtn');

    // Helper: Add message bubble
    function addMessage(text, isSelf) {
      const row = document.createElement('div');
      row.className = `msg-row ${isSelf ? 'self' : 'other'}`;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      row.appendChild(bubble);
      msgContainer.appendChild(row);
      msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    function setStatus(text, bgColor = '#f1f3f4') {
      statusEl.textContent = text;
      statusEl.style.background = bgColor;
    }

    function showChatUI() {
      setupPanel.style.display = 'none';
      chatPanel.style.display = 'flex';
      msgInput.disabled = false;
      sendBtn.disabled = false;
    }

    // Send message
    function sendMessage() {
      const msg = msgInput.value.trim();
      if (!msg || !dataChannel || dataChannel.readyState !== 'open') return;
      dataChannel.send(msg);
      addMessage(msg, true);
      msgInput.value = '';
    }
    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keypress', e => { if(e.key==='Enter') sendMessage(); });

    // Initialize data channel
    function setupDataChannel(channel) {
      dataChannel = channel;
      dataChannel.onopen = () => {
        connected = true;
        setStatus('🟢 Connected', '#d9fdd3');
        showChatUI();
        addMessage('✨ Connected securely', false);
      };
      dataChannel.onclose = () => {
        setStatus('🔴 Disconnected', '#fee');
        msgInput.disabled = true;
        sendBtn.disabled = true;
      };
      dataChannel.onmessage = e => addMessage(e.data, false);
    }

    // Create peer connection
    function createPeerConnection() {
      pc = new RTCPeerConnection(config);
      
      pc.onicecandidate = e => {
        if (e.candidate) return;
        // ICE gathering complete → we have final SDP
        if (isInitiator) {
          const offer = pc.localDescription;
          const encoded = btoa(JSON.stringify(offer));
          const url = new URL(window.location.href);
          url.hash = 'join=' + encoded;
          linkDisplay.textContent = url.toString();
          linkDisplay.style.display = 'block';
          copyBtn.style.display = 'block';
          setStatus('🟡 Link ready — share it', '#fff3cd');
        } else {
          // Answer is ready, we need to send it back to initiator
          const answer = pc.localDescription;
          const encoded = btoa(JSON.stringify(answer));
          const url = new URL(window.location.href);
          url.hash = 'answer=' + encoded;
          // Show answer link to be sent back
          linkDisplay.textContent = url.toString();
          linkDisplay.style.display = 'block';
          copyBtn.style.display = 'block';
          setStatus('🟡 Send this link back', '#fff3cd');
        }
      };

      pc.onconnectionstatechange = () => {
        if (pc.connectionState === 'connected') {
          setStatus('🟢 Connected', '#d9fdd3');
        } else if (pc.connectionState === 'failed') {
          setStatus('🔴 Failed', '#fee');
        }
      };

      pc.ondatachannel = e => setupDataChannel(e.channel);
    }

    // Initiator: Create room
    async function createRoom() {
      isInitiator = true;
      createPeerConnection();
      dataChannel = pc.createDataChannel('chat');
      setupDataChannel(dataChannel);
      
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      setStatus('🟡 Creating link...', '#fff3cd');
    }

    // Handle incoming URL hash (for joiner)
    async function handleIncomingHash() {
      const hash = window.location.hash.substring(1);
      if (!hash) return false;
      
      const params = new URLSearchParams(hash);
      const joinData = params.get('join');
      const answerData = params.get('answer');
      
      if (joinData) {
        // We are the joiner, received an offer
        try {
          const offerStr = atob(joinData);
          const offer = JSON.parse(offerStr);
          
          setStatus('🟡 Joining...', '#fff3cd');
          setupPanel.style.display = 'none';
          // Show a temporary connecting screen
          chatPanel.style.display = 'flex';
          msgInput.disabled = true;
          sendBtn.disabled = true;
          
          isInitiator = false;
          createPeerConnection();
          
          await pc.setRemoteDescription(offer);
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          
          // Answer will be set in onicecandidate, user will get link to send back
          // We'll show the setup panel again with answer link
          chatPanel.style.display = 'none';
          setupPanel.style.display = 'flex';
          createBtn.style.display = 'none';
          document.querySelector('h3').textContent = '📤 Send Answer Back';
          document.querySelector('p').textContent = 'Copy this link and send it to the person who invited you:';
        } catch(e) {
          alert('Invalid invite link');
          location.reload();
        }
        return true;
      }
      
      if (answerData) {
        // We are the initiator, received answer
        try {
          const answerStr = atob(answerData);
          const answer = JSON.parse(answerStr);
          
          setStatus('🟡 Finalizing...', '#fff3cd');
          await pc.setRemoteDescription(answer);
          // Connection will establish automatically
        } catch(e) {
          alert('Invalid answer link');
        }
        return true;
      }
      return false;
    }

    // Copy link button
    copyBtn.addEventListener('click', () => {
      navigator.clipboard?.writeText(linkDisplay.textContent);
      alert('Link copied! Send it to your partner.');
    });

    // Create room button
    createBtn.addEventListener('click', createRoom);

    // Check URL hash on load
    window.addEventListener('load', async () => {
      const hasHash = await handleIncomingHash();
      if (hasHash) {
        // If we processed a hash, clear it so refresh doesn't re-trigger
        history.replaceState(null, null, window.location.pathname);
      }
    });

    // If someone manually pastes a link, we can also check hash on popstate
    window.addEventListener('hashchange', () => {
      handleIncomingHash();
      history.replaceState(null, null, window.location.pathname);
    });

    // Fallback: If answer received via hash, we might be already in setup
    // Show appropriate UI
    if (!window.location.hash) {
      setStatus('⚪ Ready', '#f1f3f4');
    }
  })();
</script>
</body>
</html>
