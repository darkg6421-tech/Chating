<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeChat P2P · No Server</title>
  <style>
    /* same WeChat CSS as above, just adding the setup panel with textareas */
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#f0f2f5; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:8px; }
    .phone { width:100%; max-width:420px; height:700px; background:#fff; border-radius:32px; box-shadow:0 20px 40px rgba(0,0,0,0.1); display:flex; flex-direction:column; overflow:hidden; }
    .header { padding:18px 20px; border-bottom:1px solid #e9edef; display:flex; align-items:center; justify-content:space-between; }
    .messages { flex:1; overflow-y:auto; padding:16px 12px; background:#e5ddd5; display:flex; flex-direction:column; }
    .msg-row { display:flex; margin-bottom:8px; }
    .msg-row.self { justify-content:flex-end; }
    .bubble { max-width:75%; padding:10px 14px; border-radius:18px; font-size:0.95rem; background:#fff; box-shadow:0 1px 2px rgba(0,0,0,0.05); }
    .self .bubble { background:#d9fdd3; }
    .input-area { padding:12px 16px; background:#fff; border-top:1px solid #e9edef; display:flex; gap:10px; }
    .input-area input { flex:1; padding:12px 16px; border:none; background:#f0f2f5; border-radius:24px; outline:none; }
    .setup { padding:24px 20px; background:#fff; }
    textarea { width:100%; height:80px; margin:8px 0; padding:8px; border:1px solid #ddd; border-radius:12px; font-size:0.8rem; }
    button { background:#0084ff; color:white; border:none; padding:12px 20px; border-radius:24px; font-weight:500; cursor:pointer; width:100%; margin:5px 0; }
    .copy-btn { background:#e4e6eb; color:#000; }
  </style>
</head>
<body>
<div class="phone">
  <div class="header"><h2>💬 Secret Chat</h2><span id="status">⚪ Setup</span></div>
  <div id="chatUI" style="display:none; flex:1; flex-direction:column;">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input type="text" id="msgInput" placeholder="Message" disabled>
      <button id="sendBtn" disabled>➤</button>
    </div>
  </div>
  <div id="setupUI" class="setup">
    <h3 style="margin-bottom:16px;">🔐 Connect with Partner</h3>
    <button id="createOfferBtn">📤 Step 1: Create Offer</button>
    <textarea id="offerOutput" placeholder="Offer will appear here. Copy and send to partner." readonly></textarea>
    <button id="copyOfferBtn" class="copy-btn" style="display:none;">📋 Copy Offer</button>
    
    <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
    
    <p><strong>Step 2 (Partner):</strong> Paste offer below and click Accept.</p>
    <textarea id="offerInput" placeholder="Paste offer here..."></textarea>
    <button id="acceptOfferBtn">📥 Accept Offer & Generate Answer</button>
    <textarea id="answerOutput" placeholder="Answer will appear here. Copy and send back." readonly></textarea>
    <button id="copyAnswerBtn" class="copy-btn" style="display:none;">📋 Copy Answer</button>
    
    <hr style="margin:20px 0;">
    
    <p><strong>Step 3 (You):</strong> Paste the answer you received.</p>
    <textarea id="answerInput" placeholder="Paste answer here..."></textarea>
    <button id="finalizeBtn">✅ Finalize Connection</button>
  </div>
</div>
<script>
  (function(){
    const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
    let pc, dataChannel;
    let isInitiator = false;
    
    const statusSpan = document.getElementById('status');
    const setupUI = document.getElementById('setupUI');
    const chatUI = document.getElementById('chatUI');
    const msgContainer = document.getElementById('messages');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    
    function addMessage(text, isSelf) {
      const row = document.createElement('div'); row.className = `msg-row ${isSelf?'self':'other'}`;
      const bubble = document.createElement('div'); bubble.className = 'bubble'; bubble.textContent = text;
      row.appendChild(bubble);
      msgContainer.appendChild(row);
      msgContainer.scrollTop = msgContainer.scrollHeight;
    }
    
    function enableChat(channel) {
      dataChannel = channel;
      dataChannel.onmessage = e => addMessage(e.data, false);
      msgInput.disabled = false;
      sendBtn.disabled = false;
      sendBtn.onclick = () => {
        if(msgInput.value.trim() && dataChannel.readyState==='open') {
          dataChannel.send(msgInput.value);
          addMessage(msgInput.value, true);
          msgInput.value = '';
        }
      };
      msgInput.addEventListener('keypress', e => { if(e.key==='Enter') sendBtn.click(); });
      statusSpan.textContent = '🟢 Connected';
      setupUI.style.display = 'none';
      chatUI.style.display = 'flex';
    }
    
    function createPeerConnection() {
      pc = new RTCPeerConnection(config);
      pc.onicecandidate = e => {
        if(!e.candidate) {
          // gathering complete
          if(isInitiator) {
            document.getElementById('offerOutput').value = JSON.stringify(pc.localDescription);
            document.getElementById('copyOfferBtn').style.display = 'block';
          } else {
            document.getElementById('answerOutput').value = JSON.stringify(pc.localDescription);
            document.getElementById('copyAnswerBtn').style.display = 'block';
          }
        }
      };
      pc.ondatachannel = e => enableChat(e.channel);
      pc.onconnectionstatechange = () => {
        if(pc.connectionState === 'connected') statusSpan.textContent = '🟢 Connected';
        else if(pc.connectionState === 'failed') statusSpan.textContent = '🔴 Failed';
      };
    }
    
    // Create Offer (Initiator)
    document.getElementById('createOfferBtn').onclick = async () => {
      isInitiator = true;
      createPeerConnection();
      dataChannel = pc.createDataChannel('chat');
      enableChat(dataChannel);
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      statusSpan.textContent = '🟡 Offer Ready';
    };
    
    document.getElementById('copyOfferBtn').onclick = () => {
      navigator.clipboard?.writeText(document.getElementById('offerOutput').value);
      alert('Offer copied!');
    };
    
    // Accept Offer (Partner)
    document.getElementById('acceptOfferBtn').onclick = async () => {
      const offerStr = document.getElementById('offerInput').value.trim();
      if(!offerStr) return alert('Paste offer first');
      isInitiator = false;
      createPeerConnection();
      await pc.setRemoteDescription(JSON.parse(offerStr));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      statusSpan.textContent = '🟡 Answer Ready';
    };
    
    document.getElementById('copyAnswerBtn').onclick = () => {
      navigator.clipboard?.writeText(document.getElementById('answerOutput').value);
      alert('Answer copied!');
    };
    
    // Finalize (Initiator pastes answer)
    document.getElementById('finalizeBtn').onclick = async () => {
      const answerStr = document.getElementById('answerInput').value.trim();
      if(!answerStr) return alert('Paste answer first');
      await pc.setRemoteDescription(JSON.parse(answerStr));
      statusSpan.textContent = '🟢 Connected';
      setupUI.style.display = 'none';
      chatUI.style.display = 'flex';
    };
  })();
</script>
</body>
</html>
