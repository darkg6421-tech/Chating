<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Private 2‑Person Chat</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
    textarea { width: 100%; height: 80px; margin: 0.5rem 0; }
    #messages { height: 300px; overflow-y: auto; border: 1px solid #ccc; padding: 0.5rem; margin: 1rem 0; }
    .msg { margin: 0.25rem 0; }
  </style>
</head>
<body>
  <h2>🔒 Private 2‑Person Chat (P2P)</h2>
  <p><strong>Step 1:</strong> Person A clicks "Create Offer", copies the text, sends to Person B.</p>
  <button id="createOffer">📤 Create Offer</button>
  <p><strong>Step 2:</strong> Person B pastes the Offer below and clicks "Accept Offer".</p>
  <textarea id="offerInput" placeholder="Paste SDP offer here..."></textarea>
  <button id="acceptOffer">📥 Accept Offer</button>
  <p><strong>Step 3:</strong> Person B copies the generated Answer, sends it back to Person A.</p>
  <textarea id="answerInput" placeholder="Paste SDP answer here..."></textarea>
  <button id="finalizeAnswer">✅ Finalize Answer</button>

  <div id="messages"></div>

  <input type="text" id="messageInput" placeholder="Type a message..." style="width: 80%;" disabled>
  <button id="sendBtn" disabled>Send</button>

  <script>
    (function() {
      const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
      let pc, dataChannel;
      const msgDiv = document.getElementById('messages');
      const msgInput = document.getElementById('messageInput');
      const sendBtn = document.getElementById('sendBtn');

      function addMessage(text, isLocal = true) {
        const div = document.createElement('div');
        div.className = 'msg';
        div.textContent = (isLocal ? 'You: ' : 'Friend: ') + text;
        msgDiv.appendChild(div);
        msgDiv.scrollTop = msgDiv.scrollHeight;
      }

      function enableChat(channel) {
        dataChannel = channel;
        dataChannel.onmessage = e => addMessage(e.data, false);
        msgInput.disabled = false;
        sendBtn.disabled = false;
        sendBtn.onclick = () => {
          const msg = msgInput.value.trim();
          if (msg && dataChannel.readyState === 'open') {
            dataChannel.send(msg);
            addMessage(msg, true);
            msgInput.value = '';
          }
        };
        msgInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendBtn.click(); });
      }

      function createPeerConnection() {
        const newPc = new RTCPeerConnection(config);
        newPc.onicecandidate = e => {
          if (e.candidate) return;
          // When gathering finishes, the complete SDP can be retrieved
          console.log('ICE gathering complete');
        };
        newPc.ondatachannel = e => enableChat(e.channel);
        return newPc;
      }

      // --- Person A: Create Offer ---
      document.getElementById('createOffer').onclick = async () => {
        pc = createPeerConnection();
        dataChannel = pc.createDataChannel('chat');
        enableChat(dataChannel);

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        // Wait for ICE gathering to complete (optional but cleaner)
        pc.onicecandidate = e => {
          if (!e.candidate) {
            // All candidates gathered – show final offer
            document.getElementById('offerInput').value = JSON.stringify(pc.localDescription);
          }
        };
      };

      // --- Person B: Accept Offer (paste offer from A) ---
      document.getElementById('acceptOffer').onclick = async () => {
        const offerJson = document.getElementById('offerInput').value.trim();
        if (!offerJson) return alert('Paste the offer first');
        pc = createPeerConnection();

        await pc.setRemoteDescription(JSON.parse(offerJson));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);

        pc.onicecandidate = e => {
          if (!e.candidate) {
            document.getElementById('answerInput').value = JSON.stringify(pc.localDescription);
          }
        };
      };

      // --- Person A: Finalize with answer from B ---
      document.getElementById('finalizeAnswer').onclick = async () => {
        const answerJson = document.getElementById('answerInput').value.trim();
        if (!answerJson) return alert('Paste the answer from the other person');
        await pc.setRemoteDescription(JSON.parse(answerJson));
        // Connection should establish; data channel will open (if not already)
      };
    })();
  </script>
</body>
</html>
